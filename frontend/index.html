<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Downloader Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }

        .container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 40px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .logo-container {
            margin-bottom: 24px;
            display: inline-flex;
            padding: 16px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 20px;
            color: var(--primary);
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #fff, #94a3b8);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 15px;
            margin-bottom: 32px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            transition: color 0.3s;
        }

        .input-field {
            width: 100%;
            padding: 16px 20px 16px 52px;
            font-size: 15px;
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            background: rgba(15, 23, 42, 0.6);
            color: white;
            transition: all 0.3s;
            outline: none;
        }

        .input-field:focus {
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        .input-field:focus + .input-icon {
            color: var(--primary);
        }

        .download-btn {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .download-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4);
        }

        .download-btn:active {
            transform: translateY(0);
        }

        .download-btn:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .features {
            margin-top: 32px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            border-top: 1px solid var(--glass-border);
            padding-top: 24px;
        }

        .feature-item {
            font-size: 12px;
            color: #94a3b8;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .feature-icon-small {
            color: var(--primary);
        }

        /* Animación de carga */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .container { padding: 30px 24px; }
            .features { grid-template-columns: 1fr; gap: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </div>
        
        <h1>Link Downloader</h1>
        <p class="subtitle">Descarga videos y audio en alta calidad</p>
        
        <div class="input-group">
            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
            <input 
                type="url" 
                class="input-field" 
                id="urlInput"
                placeholder="Pega el enlace aquí..."
                required
            >
        </div>
        
        <button class="download-btn" id="downloadBtn">
            <span id="btnContent">Descargar contenido</span>
        </button>
        
        <div class="features">
            <div class="feature-item">
                <svg class="feature-icon-small" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                <span>Rápido</span>
            </div>
            <div class="feature-item">
                <svg class="feature-icon-small" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <span>Seguro</span>
            </div>
            <div class="feature-item">
                <svg class="feature-icon-small" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" x2="16" y1="21" y2="21"/><line x1="12" x2="12" y1="17" y2="21"/></svg>
                <span>HD/4K</span>
            </div>
        </div>
    </div>

    <script>
    const urlInput = document.getElementById('urlInput');
    const downloadBtn = document.getElementById('downloadBtn');
    const btnContent = document.getElementById('btnContent');

    downloadBtn.addEventListener('click', async () => {
        const url = urlInput.value.trim();
        
        if (!url || !isValidUrl(url)) {
            urlInput.style.borderColor = '#ef4444';
            setTimeout(() => urlInput.style.borderColor = '', 2000);
            return;
        }

        // 1. UI: Bloquear botón y mostrar carga
        downloadBtn.disabled = true;
        btnContent.innerHTML = '<div class="spinner"></div> Descargando...';

        try {
            // 2. Realizar la petición real al backend de Python
            const response = await fetch('http://127.0.0.1:5000/download', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ url: url })
            });

            const result = await response.json();

            if (response.ok && result.status === 'success') {
                // 3. UI: Éxito
                btnContent.innerHTML = ' ¡Completado!';
                downloadBtn.style.background = 'var(--success)';
                console.log("Guardado en:", result.path);
            } else {
                throw new Error(result.message || 'Error en el servidor');
            }
            
        } catch (error) {
            // 4. UI: Manejo de errores
            console.error("Error de conexión:", error);
            btnContent.innerHTML = ' Error de servidor';
            downloadBtn.style.background = '#ef4444';
        } finally {
            // 5. UI: Resetear estado después de un tiempo
            setTimeout(() => {
                btnContent.innerHTML = 'Descargar contenido';
                downloadBtn.style.background = '';
                downloadBtn.disabled = false;
                if (btnContent.innerHTML === ' ¡Completado!') urlInput.value = '';
            }, 4000);
        }
    });

    function isValidUrl(string) {
        try { new URL(string); return true; } catch (_) { return false; }
    }

    // Permitir Enter para descargar
    urlInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') downloadBtn.click();
    });
</script>
</body>
</html>
